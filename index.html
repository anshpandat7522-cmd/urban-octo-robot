<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>राधा राधा जाप</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.25)),
url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1200");
background-size:cover;
background-position:center;
}

.card{
width:min(92vw,420px);
padding:30px;
text-align:center;
border-radius:28px;
backdrop-filter:blur(12px);
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 10px 40px rgba(0,0,0,.3);
color:white;
}

h1{
font-size:2rem;
margin-bottom:10px;
}

.count{
font-size:3rem;
font-weight:bold;
margin:15px 0;
color:#ffd54f;
text-shadow:0 0 15px gold;
}

.tap-btn{
width:180px;
height:180px;
border:none;
border-radius:50%;
cursor:pointer;
font-size:2rem;
font-weight:bold;
color:white;
background:
radial-gradient(circle,#ffca28,#ff6f00);
box-shadow:
0 0 20px rgba(255,193,7,.8),
0 0 50px rgba(255,152,0,.6);
transition:.15s;
}

.tap-btn:active{
transform:scale(.92);
}

.subtitle{
margin-top:15px;
font-size:1.1rem;
opacity:.9;
}

.floating{
position:absolute;
font-size:24px;
font-weight:bold;
color:#fff;
pointer-events:none;
animation:floatUp 2.5s linear forwards;
text-shadow:0 0 10px #ffeb3b;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateY(0) scale(.8);
}
100%{
opacity:0;
transform:translateY(-180px) scale(1.5);
}
}

.petal{
position:absolute;
top:-20px;
font-size:20px;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}
</style>
</head>
<body>

<div class="card">
<h1>🌸 राधा राधा 🌸</h1>

<div class="count" id="count">0</div>

<button class="tap-btn" id="tapBtn">
📿
</button>

<div class="subtitle">
जय श्री राधे 🙏
</div>
</div>

<script>
let count = Number(localStorage.getItem("radhaCount")) || 0;
const countEl = document.getElementById("count");
countEl.textContent = count;

document.getElementById("tapBtn").addEventListener("click",(e)=>{

count++;
countEl.textContent = count;
localStorage.setItem("radhaCount",count);

const text=document.createElement("div");
text.className="floating";
text.innerText="राधा राधा 🌸";

text.style.left=(window.innerWidth/2-80+Math.random()*120)+"px";
text.style.top=(window.innerHeight/2)+"px";

document.body.appendChild(text);

setTimeout(()=>text.remove(),2500);

navigator.vibrate?.(30);
});

function createPetal(){
const p=document.createElement("div");
p.className="petal";
p.innerHTML="🌸";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*8)+"s";
p.style.fontSize=(15+Math.random()*15)+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),13000);
}

setInterval(createPetal,500);
</script>

</body>
</html>
