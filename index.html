<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Radha Naam Jap</title>
<style>
:root{--g:#ffd700;--o:#ff9800;--c:#fff8e1}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#ffcc80,#ff8a65,#6d4c41)}
.ticker{position:fixed;top:0;width:100%;padding:10px;background:rgba(0,0,0,.2);overflow:hidden}
.ticker div{white-space:nowrap;animation:s 30s linear infinite;color:#fff;font-weight:700}
@keyframes s{from{transform:translateX(100%)}to{transform:translateX(-100%)}}
.card{width:min(92vw,430px);padding:24px;border-radius:28px;background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);color:#fff;text-align:center}
.count{font-size:56px;color:var(--g);font-weight:800;margin:10px 0}
.btn{width:180px;height:180px;border-radius:50%;border:none;font-size:48px;cursor:pointer;
background:radial-gradient(circle,var(--g),var(--o))}
.row{display:flex;gap:8px;justify-content:center;margin:10px 0}
.mode,.reset{padding:10px 14px;border:none;border-radius:10px;cursor:pointer}
.active{background:gold}
.float{position:absolute;animation:up 2.5s forwards;font-weight:bold}
@keyframes up{to{transform:translateY(-180px);opacity:0}}
.petal{position:absolute;top:-20px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
</style>
</head>
<body>
<div class="ticker"><div>🕉️ राधे राधे • श्री कृष्ण • जय श्री राम • सीता राम • हर हर महादेव • जय माता दी • जय गणेश • ॐ नमो नारायणाय • 🕉️</div></div>
<div class="card">
<h1>🌸 राधा नाम जाप 🌸</h1>
<div class="count" id="count">0</div>
<div class="row">
<button id="radhe" class="mode active">🌸 राधे</button>
<button id="all" class="mode">🕉️ सर्व देव</button>
</div>
<button id="tap" class="btn">📿</button>
<div id="progress">माला: 0 / 108</div>
<div class="row"><button id="reset" class="reset">🔄 Reset</button></div>
</div>
  <audio id="bgMusic" autoplay loop>
  <source src="kishori.mp3" type="audio/mpeg">
</audio>
<script>
let count=+localStorage.getItem("radhaCount")||0;
let mode="radhe";
const names=["राधे राधे","श्री कृष्ण","जय श्री राम","सीता राम","हरे कृष्ण","हर हर Mahadev","जय बजरंगबली","जय माता दी","जय गणेश","ॐ नमः शिवाय"];
const c=document.getElementById("count"),p=document.getElementById("progress");
function upd(){c.textContent=count;p.textContent="माला: "+(count%108)+" / 108"} upd();
function speak(t){if(!speechSynthesis)return; speechSynthesis.cancel(); let u=new SpeechSynthesisUtterance(t); u.lang="hi-IN"; speechSynthesis.speak(u);}
function bell(){try{let a=new (AudioContext||webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+1.5);o.stop(a.currentTime+1.5);}catch(e){}}
function flower(){let d=document.createElement("div");d.className="petal";d.innerHTML="🌸";d.style.left=Math.random()*100+"vw";d.style.animationDuration=(4+Math.random()*4)+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),8000)}
setInterval(flower,800);
document.getElementById("radhe").onclick=()=>{mode="radhe";radhe.classList.add("active");all.classList.remove("active")}
document.getElementById("all").onclick=()=>{mode="all";all.classList.add("active");radhe.classList.remove("active")}
document.getElementById("tap").onclick=()=>{
count++; localStorage.setItem("radhaCount",count); upd();
let txt=mode==="radhe"?"राधे राधे":names[Math.floor(Math.random()*names.length)];
speak(txt);
let f=document.createElement("div"); f.className="float"; f.textContent=txt+" 🌸";
f.style.left=(innerWidth/2)+"px"; f.style.top=(innerHeight/2)+"px"; document.body.appendChild(f); setTimeout(()=>f.remove(),2500);
if(count%108===0) bell();
};
document.getElementById("reset").onclick=()=>{if(confirm("काउंटर रीसेट करें?")){count=0;localStorage.setItem("radhaCount",0);upd();}};
  document.addEventListener('click', () => {
  document.getElementById('bgMusic').play().catch(() => {});
}, { once: true });
  <audio id="bgMusic" loop autoplay>
  <source src="kishori.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", () => {
  const music = document.getElementById("bgMusic");
  music.play().catch(() => {});
}, { once: true });
</script>
</script>
</body>
</html>
