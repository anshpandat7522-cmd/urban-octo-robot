<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Radha Radha Jap Mala 🌸</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(90,30,0,.35),rgba(90,30,0,.35)),
linear-gradient(135deg,#ffcc80,#ff8a65,#f48fb1);
}

.card{
width:min(92vw,420px);
padding:30px;
border-radius:30px;
text-align:center;
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 15px 40px rgba(0,0,0,.25);
color:white;
z-index:10;
}

h1{
font-size:2rem;
margin-bottom:8px;
}

.count{
font-size:3.5rem;
font-weight:bold;
color:#ffe082;
text-shadow:0 0 20px gold;
margin:15px 0;
}

.mala{
font-size:1rem;
margin-bottom:15px;
opacity:.9;
}

.tap-btn{
width:190px;
height:190px;
border:none;
border-radius:50%;
cursor:pointer;
font-size:3rem;
background:radial-gradient(circle,#ffd54f,#ff9800);
box-shadow:
0 0 25px rgba(255,193,7,.9),
0 0 60px rgba(255,152,0,.7);
transition:.15s;
}

.tap-btn:active{
transform:scale(.92);
}

.floating{
position:absolute;
font-weight:bold;
font-size:24px;
color:white;
pointer-events:none;
animation:floatUp 2.4s linear forwards;
text-shadow:0 0 15px gold;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateY(0) scale(.8);
}
100%{
opacity:0;
transform:translateY(-220px) scale(1.5);
}
}

.petal{
position:absolute;
top:-20px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

.blessing{
margin-top:18px;
font-size:1.1rem;
color:#fff8e1;
}

.progress{
margin-top:15px;
font-size:18px;
}
</style>
</head>
<body>

<div class="card">

<h1>🌸 राधा राधा 🌸</h1>

<div class="count" id="count">0</div>

<div class="mala">
108 जाप पूर्ण होने पर 🔔 घंटी बजेगी
</div>

<button id="tapBtn" class="tap-btn">
📿
</button>

<div class="progress" id="progress">
माला: 0 / 108
</div>

<div class="blessing">
जय श्री राधे 🙏
</div>

</div>

<script>

let count = Number(localStorage.getItem("radhaCount")) || 0;

const countEl = document.getElementById("count");
const progressEl = document.getElementById("progress");

countEl.innerText = count;
updateProgress();

function updateProgress(){
progressEl.innerText =
"माला: " + (count % 108) + " / 108";
}

function speakRadha(){

if(!window.speechSynthesis) return;

speechSynthesis.cancel();

const msg = new SpeechSynthesisUtterance("राधा राधा");

msg.lang = "hi-IN";
msg.rate = 0.9;
msg.pitch = 1.1;
msg.volume = 1;

speechSynthesis.speak(msg);
}

function templeBell(){

const ctx = new (window.AudioContext ||
window.webkitAudioContext)();

const osc = ctx.createOscillator();
const gain = ctx.createGain();

osc.type = "sine";
osc.frequency.value = 800;

osc.connect(gain);
gain.connect(ctx.destination);

gain.gain.setValueAtTime(0.4,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(
0.001,
ctx.currentTime + 2
);

osc.start();
osc.stop(ctx.currentTime + 2);
}

function createFloatingText(){

const t = document.createElement("div");

t.className="floating";
t.innerText="राधा राधा 🌸";

t.style.left =
(window.innerWidth/2 - 70 +
Math.random()*140) + "px";

t.style.top =
(window.innerHeight/2 + 50) + "px";

document.body.appendChild(t);

setTimeout(()=>{
t.remove();
},2400);
}

function flowerBurst(){

for(let i=0;i<15;i++){

const p=document.createElement("div");

p.className="petal";
p.innerHTML="🌸";

p.style.left=Math.random()*100+"vw";
p.style.fontSize=(16+Math.random()*18)+"px";
p.style.animationDuration=
(3+Math.random()*4)+"s";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},7000);

}
}

function tapJap(){

count++;

countEl.innerText=count;

localStorage.setItem(
"radhaCount",
count
);

updateProgress();

speakRadha();

createFloatingText();

flowerBurst();

navigator.vibrate?.(40);

if(count % 108 === 0){

templeBell();

setTimeout(()=>{

const msg =
new SpeechSynthesisUtterance(
"एक माला पूर्ण हुई। जय श्री राधे।"
);

msg.lang="hi-IN";
speechSynthesis.speak(msg);

},1200);
}
}

document
.getElementById("tapBtn")
.addEventListener("click",tapJap);

setInterval(()=>{

const p=document.createElement("div");

p.className="petal";
p.innerHTML="🌸";

p.style.left=Math.random()*100+"vw";
p.style.fontSize=(12+Math.random()*10)+"px";
p.style.animationDuration=
(8+Math.random()*6)+"s";

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},14000);

},700);

</script>

</body>
</html>
